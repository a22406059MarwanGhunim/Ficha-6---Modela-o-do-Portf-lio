{% extends "portfolio/base.html" %}
{% block content %}
<h2>Editar Tecnologia: {{ tecnologia.nome }}</h2>

    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Atualizar</button>
</form>
<br><a href="{% url 'portfolio:tecnologias' %}">Cancelar</a>
{% endblock %}
