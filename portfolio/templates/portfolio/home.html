{% extends "portfolio/base.html" %}

{% block content %}
<div style="text-align: center; padding: 40px 0;">
    <h2>Bem-vindo ao meu Portfólio</h2>
    <p>Selecione uma das secções abaixo para explorar o meu percurso académico e projetos.</p>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px;">
        
        <a href="{% url 'portfolio:licenciatura' %}" style="text-decoration: none;">
            <div style="background: #007bff; color: white; padding: 20px; border-radius: 8px;">
                <h3>Licenciatura</h3>
            </div>
        </a>

        <a href="{% url 'portfolio:ucs' %}" style="text-decoration: none;">
            <div style="background: #28a745; color: white; padding: 20px; border-radius: 8px;">
                <h3>Disciplinas (UCs)</h3>
            </div>
        </a>

        <a href="{% url 'portfolio:projetos' %}" style="text-decoration: none;">
            <div style="background: #fd7e14; color: white; padding: 20px; border-radius: 8px;">
                <h3>Projetos</h3>
            </div>
        </a>

        <a href="{% url 'portfolio:tecnologias' %}" style="text-decoration: none;">
            <div style="background: #6f42c1; color: white; padding: 20px; border-radius: 8px;">
                <h3>Tecnologias</h3>
            </div>
        </a>

        <a href="{% url 'portfolio:tfcs' %}" style="text-decoration: none;">
            <div style="background: #dc3545; color: white; padding: 20px; border-radius: 8px;">
                <h3>TFCs</h3>
            </div>
        </a>

        <a href="{% url 'portfolio:formacao' %}" style="text-decoration: none;">
            <div style="background: #20c997; color: white; padding: 20px; border-radius: 8px;">
                <h3>Formação</h3>
            </div>
        </a>

    </div>
</div>
{% endblock %}
